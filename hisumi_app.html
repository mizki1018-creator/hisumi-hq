<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-dark:#0a0e1a; --bg-card:#111827; --bg-card2:#1a2235;
  --blue:#5B9BD5; --blue-light:#7ab3e0; --blue-glow:rgba(91,155,213,0.3);
  --pink:#FF6B9D; --pink-light:#ff8fb5; --pink-glow:rgba(255,107,157,0.3);
  --green:#4ecdc4; --green-glow:rgba(78,205,196,0.3);
  --purple:#a78bfa; --gold:#f5c842; --gold-glow:rgba(245,200,66,0.3);
  --text:#e2e8f0; --text-muted:#8892a4;
  --border:rgba(91,155,213,0.2); --border-pink:rgba(255,107,157,0.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans JP',sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(91,155,213,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(255,107,157,0.06) 0%,transparent 60%);
}

/* ===== HEADER ===== */
.header{text-align:center;padding:24px 16px 16px;}
.header-title{
  font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--blue-light),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px var(--blue-glow));
}
.header-sub{font-size:.7rem;color:var(--text-muted);margin-top:4px;letter-spacing:.2em;}

/* ===== STATS ===== */
.stats-container{display:flex;gap:12px;padding:12px 16px;max-width:600px;margin:0 auto;}
.stat-card{
  flex:1;background:var(--bg-card);border-radius:16px;padding:16px 12px;
  border:1px solid var(--border);position:relative;overflow:hidden;transition:box-shadow .3s;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.stat-card.pink::before{background:linear-gradient(90deg,transparent,var(--pink),transparent);}
.stat-card:hover{box-shadow:0 4px 20px var(--blue-glow);}
.stat-label{font-size:.7rem;color:var(--text-muted);letter-spacing:.1em;margin-bottom:6px;}
.stat-value{
  font-size:clamp(1.4rem,4vw,2rem);font-weight:700;line-height:1;margin-bottom:10px;
  cursor:pointer;transition:filter .2s;
}
.stat-value:hover{filter:brightness(1.2);}
.stat-value::after{content:'📈';font-size:.7rem;margin-left:4px;opacity:.6;vertical-align:middle;}
.stat-card.blue .stat-value{color:var(--blue-light);}
.stat-card.pink .stat-value{color:var(--pink-light);}
.stat-input-row{display:flex;gap:6px;}
.stat-input{
  flex:1;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:inherit;font-size:.85rem;padding:6px 8px;
  outline:none;transition:border-color .2s;width:0;
}
.stat-input:focus{border-color:var(--blue);}
.stat-btn{
  background:var(--blue);border:none;border-radius:8px;color:white;
  font-size:.75rem;font-family:inherit;padding:6px 10px;cursor:pointer;
  white-space:nowrap;transition:opacity .2s,transform .1s;
}
.stat-btn:active{transform:scale(.96);}
.stat-btn.pink{background:var(--pink);}

/* ===== TABS ===== */
.tab-nav{
  display:flex;padding:12px 8px 0;max-width:900px;margin:0 auto;
  border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:0 0 auto;min-width:62px;background:none;border:none;
  color:var(--text-muted);font-family:inherit;font-size:.75rem;
  padding:8px 8px;cursor:pointer;position:relative;
  transition:color .2s;letter-spacing:.03em;white-space:nowrap;
}
.tab-btn::after{
  content:'';position:absolute;bottom:-1px;left:15%;right:15%;
  height:2px;border-radius:2px;background:var(--blue);
  transform:scaleX(0);transition:transform .2s;
}
.tab-btn.active{color:var(--blue-light);}
.tab-btn.active::after{transform:scaleX(1);}
.tab-icon{display:block;font-size:1rem;margin-bottom:2px;}

/* ===== TAB CONTENT ===== */
.tab-content{display:none;padding:16px;max-width:900px;margin:0 auto;}
.tab-content.active{display:block;}

/* ===== COMMON ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:1rem;font-weight:700;color:var(--blue-light);display:flex;align-items:center;gap:6px;}
.empty-state{text-align:center;padding:48px 16px;color:var(--text-muted);font-size:.85rem;}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.5;}

/* ===== BUTTONS ===== */
.btn-primary{
  background:linear-gradient(135deg,var(--blue),#4a86c0);border:none;border-radius:10px;
  color:white;font-family:inherit;font-size:.8rem;font-weight:500;padding:8px 14px;
  cursor:pointer;transition:opacity .2s,transform .1s,box-shadow .2s;
  box-shadow:0 2px 10px var(--blue-glow);
}
.btn-primary:hover{opacity:.9;box-shadow:0 4px 16px var(--blue-glow);}
.btn-primary:active{transform:scale(.97);}
.btn-pink{background:linear-gradient(135deg,var(--pink),#e55a88);box-shadow:0 2px 10px var(--pink-glow);}
.btn-pink:hover{box-shadow:0 4px 16px var(--pink-glow);}
.btn-green{background:linear-gradient(135deg,var(--green),#3ab5ad);box-shadow:0 2px 10px var(--green-glow);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d4a820);box-shadow:0 2px 10px var(--gold-glow);}
.btn-ghost{
  background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--text-muted);font-family:inherit;font-size:.75rem;
  padding:4px 10px;cursor:pointer;transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:var(--pink);color:var(--pink-light);}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);z-index:100;
  align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg-card);border:1px solid var(--border);border-radius:20px;
  padding:24px;width:100%;max-width:440px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);animation:modalIn .2s ease;
  max-height:90vh;overflow-y:auto;
}
@keyframes modalIn{from{transform:scale(.95) translateY(10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-title{font-size:1rem;font-weight:700;color:var(--blue-light);margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:.75rem;color:var(--text-muted);margin-bottom:6px;letter-spacing:.05em;}
.form-input,.form-textarea,.form-select{
  width:100%;background:var(--bg-dark);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.9rem;padding:10px 12px;
  outline:none;transition:border-color .2s;
}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--blue);}
.form-textarea{min-height:80px;resize:vertical;}
.form-select option{background:var(--bg-card);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* ===== CALENDAR ===== */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;gap:8px;flex-wrap:wrap;
}
.cal-month-label{
  font-size:1.1rem;font-weight:700;
  background:linear-gradient(135deg,var(--blue-light),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-arrow{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--text-muted);cursor:pointer;font-size:1rem;
  padding:4px 12px;transition:border-color .2s,color .2s;
}
.cal-arrow:hover{border-color:var(--blue);color:var(--blue-light);}
.cal-today-btn{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--text-muted);cursor:pointer;font-size:.75rem;
  padding:4px 10px;transition:border-color .2s,color .2s;
}
.cal-today-btn:hover{border-color:var(--blue);color:var(--blue-light);}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.cal-legend-item{
  display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--text-muted);
}
.cal-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;
}
.cal-dow{
  text-align:center;font-size:.7rem;font-weight:700;
  color:var(--text-muted);padding:6px 2px;letter-spacing:.05em;
}
.cal-dow.sun{color:#ff8fb5;}
.cal-dow.sat{color:var(--blue-light);}
.cal-cell{
  background:var(--bg-card);border:1px solid rgba(255,255,255,.04);
  border-radius:8px;padding:4px 3px;min-height:72px;
  cursor:pointer;transition:border-color .2s,background .2s;
  display:flex;flex-direction:column;gap:2px;overflow:hidden;
  position:relative;
}
.cal-cell:hover{border-color:var(--blue);background:rgba(91,155,213,.05);}
.cal-cell.today{border-color:rgba(91,155,213,.6);box-shadow:0 0 8px var(--blue-glow);}
.cal-cell.other-month{opacity:.3;}
.cal-cell.sun .cal-day-num{color:#ff8fb5;}
.cal-cell.sat .cal-day-num{color:var(--blue-light);}
.cal-day-num{
  font-size:.8rem;font-weight:700;color:var(--text);
  text-align:right;padding:0 2px;line-height:1.4;
}
.cal-cell.today .cal-day-num{
  background:var(--blue);color:white;border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  margin-left:auto;font-size:.75rem;
}
.cal-event{
  font-size:.62rem;line-height:1.3;padding:1px 4px;border-radius:4px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  cursor:pointer;
}
.cal-event.type-game  {background:rgba(91,155,213,.25);color:var(--blue-light);}
.cal-event.type-horse {background:rgba(255,107,157,.25);color:var(--pink-light);}
.cal-event.type-chat  {background:rgba(78,205,196,.25);color:var(--green);}
.cal-event.type-other {background:rgba(167,139,250,.25);color:var(--purple);}
.cal-event.type-task  {background:rgba(245,200,66,.2);color:var(--gold);}
.cal-more{font-size:.6rem;color:var(--text-muted);padding:0 4px;text-align:right;}

/* Day detail modal */
.day-detail-modal{max-width:480px;}
.day-detail-section{margin-bottom:16px;}
.day-detail-section-title{
  font-size:.75rem;font-weight:700;letter-spacing:.08em;
  color:var(--text-muted);margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.day-sched-item{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.day-sched-time{font-size:.75rem;color:var(--text-muted);min-width:38px;flex-shrink:0;}
.day-sched-title{font-size:.85rem;color:var(--text);flex:1;min-width:0;word-break:break-all;}
.day-sched-badge{
  font-size:.65rem;padding:2px 6px;border-radius:20px;flex-shrink:0;
}
.day-task-item{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.day-task-check{
  appearance:none;width:14px;height:14px;min-width:14px;
  border:2px solid var(--blue);border-radius:4px;cursor:pointer;
  position:relative;transition:background .2s;
}
.day-task-check:checked{background:var(--blue);}
.day-task-check:checked::after{
  content:'✓';position:absolute;top:-2px;left:1px;
  font-size:10px;color:white;font-weight:700;
}
.day-task-text{font-size:.85rem;color:var(--text);flex:1;word-break:break-all;}
.day-task-item.done .day-task-text{text-decoration:line-through;color:var(--text-muted);}
.day-add-row{display:flex;gap:6px;margin-top:8px;}
.day-add-input{
  flex:1;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:inherit;font-size:.8rem;padding:6px 10px;
  outline:none;transition:border-color .2s;min-width:0;
}
.day-add-input:focus{border-color:var(--blue);}
.day-add-btn{
  background:var(--blue);border:none;border-radius:8px;color:white;
  cursor:pointer;font-size:.85rem;padding:6px 12px;flex-shrink:0;
}

/* ===== 企画 ===== */
.plan-list{display:flex;flex-direction:column;gap:12px;}
.plan-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:14px;padding:16px;position:relative;overflow:hidden;
  transition:box-shadow .2s,transform .2s;
}
.plan-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--blue),var(--pink));
  border-radius:3px 0 0 3px;
}
.plan-card:hover{box-shadow:0 4px 20px var(--blue-glow);transform:translateY(-1px);}
.plan-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.plan-card-title{font-size:.95rem;font-weight:700;color:var(--blue-light);}
.plan-card-date{font-size:.7rem;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
.plan-card-body{font-size:.85rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.plan-card-footer{display:flex;justify-content:flex-end;margin-top:12px;}

/* ===== タスク ===== */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.week-nav{display:flex;align-items:center;gap:10px;}
.week-label{font-size:.8rem;color:var(--text-muted);min-width:130px;text-align:center;}
.week-arrow{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--text-muted);cursor:pointer;font-size:1rem;
  padding:4px 10px;transition:border-color .2s,color .2s;
}
.week-arrow:hover{border-color:var(--blue);color:var(--blue-light);}
.week-columns{
  display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;
  scrollbar-width:thin;scrollbar-color:var(--blue-glow) transparent;
}
.week-columns::-webkit-scrollbar{height:4px;}
.week-columns::-webkit-scrollbar-thumb{background:var(--blue-glow);border-radius:2px;}
.day-column{
  min-width:150px;flex:1;background:var(--bg-card);
  border:1px solid var(--border);border-radius:14px;
  padding:12px 10px;display:flex;flex-direction:column;gap:8px;
}
.day-column.today{border-color:rgba(91,155,213,.5);box-shadow:0 0 12px var(--blue-glow);}
.day-header{text-align:center;margin-bottom:4px;}
.day-name{font-size:.75rem;font-weight:700;color:var(--text-muted);letter-spacing:.05em;}
.day-date{font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.2;}
.day-column.today .day-name,.day-column.today .day-date{color:var(--blue-light);}
.task-item{
  display:flex;align-items:flex-start;gap:7px;background:var(--bg-dark);
  border-radius:8px;padding:7px 8px;transition:opacity .2s;
}
.task-item.done{opacity:.4;}
.task-checkbox{
  appearance:none;width:14px;height:14px;min-width:14px;
  border:2px solid var(--blue);border-radius:4px;cursor:pointer;
  position:relative;margin-top:2px;transition:background .2s;
}
.task-checkbox:checked{background:var(--blue);}
.task-checkbox:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:10px;color:white;font-weight:700;}
.task-text{font-size:.8rem;color:var(--text);line-height:1.4;word-break:break-all;flex:1;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text-muted);}
.task-del{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:.75rem;padding:0 2px;opacity:0;transition:opacity .2s,color .2s;flex-shrink:0;
}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{color:var(--pink);}
.add-task-form{display:flex;gap:4px;margin-top:4px;}
.add-task-input{
  flex:1;background:var(--bg-dark);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:inherit;font-size:.75rem;padding:6px 8px;
  outline:none;transition:border-color .2s;min-width:0;
}
.add-task-input:focus{border-color:var(--blue);}
.add-task-btn{
  background:var(--blue);border:none;border-radius:7px;color:white;
  cursor:pointer;font-size:.9rem;padding:4px 8px;flex-shrink:0;
}

/* ===== マネタイズ ===== */
.goal-list{display:flex;flex-direction:column;gap:16px;}
.goal-card{
  background:var(--bg-card);border:1px solid var(--border-pink);
  border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:box-shadow .2s;
}
.goal-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--pink),var(--blue));border-radius:3px 0 0 3px;
}
.goal-card:hover{box-shadow:0 4px 20px var(--pink-glow);}
.goal-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.goal-title{font-size:.95rem;font-weight:700;color:var(--pink-light);flex:1;}
.goal-progress-bar{height:6px;background:var(--bg-dark);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.goal-progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--blue));border-radius:3px;transition:width .4s ease;}
.goal-progress-label{font-size:.7rem;color:var(--text-muted);text-align:right;margin-bottom:10px;margin-top:-8px;}
.action-list{display:flex;flex-direction:column;gap:8px;}
.action-item{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04);transition:opacity .2s;
}
.action-item.done{opacity:.45;}
.action-checkbox{
  appearance:none;width:16px;height:16px;min-width:16px;
  border:2px solid var(--pink);border-radius:50%;cursor:pointer;
  position:relative;transition:background .2s;
}
.action-checkbox:checked{background:var(--pink);}
.action-checkbox:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:10px;color:white;font-weight:700;}
.action-text{font-size:.85rem;color:var(--text);flex:1;word-break:break-all;}
.action-item.done .action-text{text-decoration:line-through;color:var(--text-muted);}
.action-del{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:.75rem;padding:0 2px;opacity:0;transition:opacity .2s,color .2s;
}
.action-item:hover .action-del{opacity:1;}
.action-del:hover{color:var(--pink);}
.add-action-form{display:flex;gap:6px;margin-top:10px;}
.add-action-input{
  flex:1;background:var(--bg-dark);border:1px solid var(--border-pink);border-radius:8px;
  color:var(--text);font-family:inherit;font-size:.8rem;padding:7px 10px;
  outline:none;transition:border-color .2s;
}
.add-action-input:focus{border-color:var(--pink);}
.add-action-btn{
  background:var(--pink);border:none;border-radius:8px;color:white;
  cursor:pointer;font-size:.85rem;padding:6px 12px;flex-shrink:0;
}

/* ===== 競馬メモ ===== */
.horse-list{display:flex;flex-direction:column;gap:12px;}
.horse-card{
  background:var(--bg-card);border:1px solid var(--border-pink);
  border-radius:14px;padding:16px;position:relative;overflow:hidden;
  transition:box-shadow .2s,transform .2s;
}
.horse-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;
}
.horse-card.cat-collab::before{background:var(--blue);}
.horse-card.cat-result::before{background:var(--pink);}
.horse-card.cat-idea::before{background:var(--green);}
.horse-card.cat-other::before{background:var(--purple);}

.horse-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.horse-card-left{flex:1;min-width:0;}
.horse-card-title{font-size:.95rem;font-weight:700;color:var(--pink-light);margin-bottom:4px;}
.horse-cat-badge{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:500;}
.horse-cat-badge.cat-collab{background:rgba(91,155,213,.15);color:var(--blue-light);border:1px solid rgba(91,155,213,.3);}
.horse-cat-badge.cat-result{background:rgba(255,107,157,.15);color:var(--pink-light);border:1px solid rgba(255,107,157,.3);}
.horse-cat-badge.cat-idea{background:rgba(78,205,196,.15);color:var(--green);border:1px solid rgba(78,205,196,.3);}
.horse-cat-badge.cat-other{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
.horse-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.horse-card-date{font-size:.7rem;color:var(--text-muted);white-space:nowrap;}
.horse-card-body{font-size:.85rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;}

/* ===== 収益 ===== */
.income-summary{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;margin-bottom:20px;
}
.income-sum-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;text-align:center;
}
.income-sum-label{font-size:.68rem;color:var(--text-muted);letter-spacing:.05em;margin-bottom:4px;}
.income-sum-value{font-size:1.2rem;font-weight:700;color:var(--gold);}
.income-list{display:flex;flex-direction:column;gap:8px;}
.income-item{
  background:var(--bg-card);border:1px solid var(--border);

  position:relative;overflow:hidden;transition:box-shadow .2s;
}
.income-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.income-item.cat-supa::before{background:var(--pink);}
.income-item.cat-member::before{background:var(--blue);}
.income-item.cat-goods::before{background:var(--green);}
.income-item.cat-sponsor::before{background:var(--gold);}
.income-item.cat-other::before{background:var(--purple);}
.income-item:hover{box-shadow:0 4px 16px var(--gold-glow);}
.income-badge{
  font-size:.65rem;padding:2px 7px;border-radius:20px;font-weight:500;flex-shrink:0;
}
.income-badge.cat-supa{background:rgba(255,107,157,.15);color:var(--pink-light);border:1px solid rgba(255,107,157,.3);}
.income-badge.cat-member{background:rgba(91,155,213,.15);color:var(--blue-light);border:1px solid rgba(91,155,213,.3);}
.income-badge.cat-goods{background:rgba(78,205,196,.15);color:var(--green);border:1px solid rgba(78,205,196,.3);}
.income-badge.cat-sponsor{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
.income-badge.cat-other{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
.income-info{flex:1;min-width:0;}
.income-memo{font-size:.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.income-date{font-size:.68rem;color:var(--text-muted);}
.income-amount{font-size:1rem;font-weight:700;color:var(--gold);flex-shrink:0;}
.income-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}

/* ===== チャレンジ ===== */
.challenge-list{display:flex;flex-direction:column;gap:20px;}
.challenge-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;padding:16px;position:relative;overflow:hidden;
  transition:box-shadow .2s;
}
.challenge-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--blue),var(--purple));border-radius:3px 0 0 3px;
}
.challenge-card:hover{box-shadow:0 4px 20px var(--blue-glow);}
.challenge-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.challenge-title{font-size:.95rem;font-weight:700;color:var(--blue-light);flex:1;}
.challenge-progress-bar{height:6px;background:var(--bg-dark);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.challenge-progress-fill{
  height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));
  border-radius:3px;transition:width .3s ease;
}
.challenge-progress-label{font-size:.7rem;color:var(--text-muted);text-align:right;margin-bottom:14px;}
.challenge-grid{
  display:grid;gap:4px;
  grid-template-columns:repeat(auto-fill,minmax(36px,1fr));
}
.c-cell{
  aspect-ratio:1;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;cursor:pointer;
  border:1px solid rgba(91,155,213,.25);
  background:var(--bg-dark);color:var(--text-muted);
  transition:all .15s;
  user-select:none;
}
.c-cell:hover{border-color:var(--blue);color:var(--blue-light);background:rgba(91,155,213,.08);}
.c-cell.filled{
  background:linear-gradient(135deg,rgba(91,155,213,.35),rgba(167,139,250,.35));
  border-color:var(--purple);color:var(--blue-light);
  box-shadow:0 0 6px rgba(167,139,250,.3);
}
.challenge-actions-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.challenge-reset{
  background:none;border:1px solid rgba(255,107,157,.3);border-radius:8px;
  color:var(--text-muted);font-family:inherit;font-size:.72rem;
  padding:4px 10px;cursor:pointer;transition:border-color .2s,color .2s;
}
.challenge-reset:hover{border-color:var(--pink);color:var(--pink-light);}

/* ===== グラフモーダル ===== */
.chart-modal{max-width:520px;}
.chart-toggle{display:flex;gap:8px;margin-bottom:16px;}
.chart-toggle-btn{
  flex:1;background:var(--bg-dark);border:1px solid var(--border);
  border-radius:10px;color:var(--text-muted);font-family:inherit;
  font-size:.8rem;padding:8px 12px;cursor:pointer;transition:all .2s;
}
.chart-toggle-btn.active.blue{border-color:var(--blue);color:var(--blue-light);background:rgba(91,155,213,.1);}
.chart-toggle-btn.active.pink{border-color:var(--pink);color:var(--pink-light);background:rgba(255,107,157,.1);}
.chart-canvas-wrap{background:var(--bg-dark);border-radius:12px;padding:12px;position:relative;height:220px;}
.chart-no-data{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  color:var(--text-muted);font-size:.85rem;text-align:center;
}

/* ===== SCHED BADGE SHARED ===== */
.sched-badge{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:500;}
.sched-badge.type-game{background:rgba(91,155,213,.15);color:var(--blue-light);border:1px solid rgba(91,155,213,.3);}
.sched-badge.type-horse{background:rgba(255,107,157,.15);color:var(--pink-light);border:1px solid rgba(255,107,157,.3);}
.sched-badge.type-chat{background:rgba(78,205,196,.15);color:var(--green);border:1px solid rgba(78,205,196,.3);}
.sched-badge.type-other{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3);}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:.8rem;color:var(--text);
  z-index:999;opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:500px){
  .stats-container{flex-direction:column;}
  .day-column{min-width:130px;}
  .cal-cell{min-height:56px;}
  .c-cell{font-size:.65rem;}
}

/* ===== 収益（月次）===== */
.income-goal-box{background:var(--bg-card);border:1px solid rgba(245,200,66,.35);border-radius:16px;padding:20px 20px 16px;margin-bottom:16px;text-align:center;position:relative;}
.income-goal-lbl{font-size:.72rem;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.income-goal-val{font-size:2.2rem;font-weight:700;color:var(--gold);margin-bottom:4px;line-height:1.1;}
.income-goal-btn{position:absolute;top:12px;right:12px;}
.income-status-box{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.income-status-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.income-status-label{font-size:.75rem;color:var(--text-muted);}
.income-status-total{font-size:1.4rem;font-weight:700;color:var(--gold);}
.income-status-diff{font-size:.88rem;font-weight:700;}
.income-status-diff.ok{color:var(--green);}
.income-status-diff.ng{color:var(--pink-light);}
.income-goal-bar{height:8px;background:var(--bg-dark);border-radius:4px;overflow:hidden;margin:8px 0 4px;}
.income-goal-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:4px;transition:width .4s ease;}
.income-goal-pct{font-size:.7rem;color:var(--text-muted);text-align:right;}
.income-monthly-card{background:var(--bg-card);border:1px solid rgba(245,200,66,.2);border-radius:14px;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;transition:box-shadow .2s;}
.income-monthly-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--green));border-radius:3px 0 0 3px;}
.income-monthly-card:hover{box-shadow:0 4px 16px var(--gold-glow);}
.income-monthly-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.income-monthly-ym{font-size:1rem;font-weight:700;color:var(--gold);}
.income-monthly-total{font-size:1.1rem;font-weight:700;color:var(--gold);}
.income-monthly-bd{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.income-bd-item{font-size:.7rem;background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);border-radius:20px;padding:2px 8px;color:var(--text-muted);}
.income-bd-item b{color:var(--gold);}

/* ===== 企画 インライン編集 ===== */
.plan-card-view{display:block;}
.plan-edit-form{display:none;padding:4px 0;}
.plan-card.editing .plan-card-view{display:none;}
.plan-card.editing .plan-edit-form{display:block;}
.plan-edit-input{width:100%;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.9rem;padding:8px 10px;outline:none;transition:border-color .2s;margin-bottom:8px;}
.plan-edit-input:focus{border-color:var(--blue);}
.plan-edit-ta{width:100%;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.85rem;padding:8px 10px;outline:none;resize:vertical;min-height:80px;transition:border-color .2s;}
.plan-edit-ta:focus{border-color:var(--blue);}
.plan-edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}

/* ===== PWA ===== */
.pwa-install-btn{
  display:none;position:fixed;bottom:24px;right:16px;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  border:none;border-radius:50px;color:white;font-family:inherit;
  font-size:.8rem;font-weight:700;padding:10px 18px;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:50;
}
.notif-setup{
  background:rgba(91,155,213,.08);border:1px solid rgba(91,155,213,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  font-size:.78rem;color:var(--text-muted);
}
</style>
</head>

<div class="toast" id="toast"></div>

<script>
// ========== DATA ==========
const STORAGE_KEY = 'hisumi_data_v1';
let data = {
  subCount:0, memCount:0,
  subHistory:[], memHistory:[],
  plans:[], tasks:{}, goals:[],
  schedules:[], horseNotes:[],
  income:[], challenges:[],
  incomeMonthly:[], monthlyTarget:0
};

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } db.ref('hisumi_data').set(data).catch(e=>console.warn(e));
function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  try{
    const p = JSON.parse(raw);
    Object.assign(data, p);
    ['subHistory','memHistory','schedules','horseNotes','income','challenges','incomeMonthly']
      .forEach(k=>{ if(!data[k]) data[k]=[]; });
    if(!data.tasks) data.tasks={};
    if(!data.monthlyTarget) data.monthlyTarget=0;
  }catch(e){}
}db.ref('hisumi_data').on('value', snapshot=>{
    const d = snapshot.val();
    if(!d || Object.keys(d).length === 0) return;
    Object.assign(data, d);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    renderStats(); renderCalendar(); renderPlans(); renderWeek();
    renderGoals(); renderHorseFilter(); renderHorseNotes();
    renderIncomeTab(); renderChallenges();
  });
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function escHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDate(d){
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}
function dateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

load();

// ========== STATS ==========
function renderStats(){
  document.getElementById('subCount').textContent=Number(data.subCount).toLocaleString();
  document.getElementById('memCount').textContent=Number(data.memCount).toLocaleString();
}
function updateStat(type){
  const el=document.getElementById(type==='sub'?'subInput':'memInput');
  const v=parseInt(el.value);
  if(isNaN(v)||v<0){ toast('正しい数値を入力してください'); return; }
  const ds=formatDate(new Date());
  if(type==='sub'){
    data.subCount=v;
    const i=data.subHistory.findIndex(h=>h.date===ds);
    if(i>=0) data.subHistory[i].value=v; else data.subHistory.push({date:ds,value:v});
    toast('登録者数を更新しました！');
  } else {
    data.memCount=v;
    const i=data.memHistory.findIndex(h=>h.date===ds);
    if(i>=0) data.memHistory[i].value=v; else data.memHistory.push({date:ds,value:v});
    toast('メンバー数を更新しました！');
  }
  el.value=''; save(); renderStats();
}
document.getElementById('subInput').addEventListener('keydown',e=>{ if(e.key==='Enter') updateStat('sub'); });
document.getElementById('memInput').addEventListener('keydown',e=>{ if(e.key==='Enter') updateStat('mem'); });

// ========== TABS ==========
function switchTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='sched')    renderCalendar();
  if(name==='task')     renderWeek();
  if(name==='horse')    { renderHorseFilter(); renderHorseNotes(); }
  if(name==='income')   renderIncomeTab();
  if(name==='challenge') renderChallenges();
}

// ========== MODAL ==========
function openModal(type, preDate){
  document.getElementById('modal-'+type).classList.add('open');
  if(type==='sched' && preDate){
    document.getElementById('schedDate').value = preDate;
  }
  const first=document.querySelector('#modal-'+type+' .form-input');
  if(first) setTimeout(()=>first.focus(),80);
}
function closeModal(type){
  document.getElementById('modal-'+type).classList.remove('open');
  if(type==='chart') destroyChart();
}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{
    if(e.target===el){ const id=el.id.replace('modal-',''); closeModal(id); }
  });
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay.open').forEach(el=>{
      closeModal(el.id.replace('modal-',''));
    });
  }
});

// ========== CALENDAR ==========
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDayKey = null;

const TYPE_LABELS = {game:'🎮 ゲーム',horse:'🏇 競馬',chat:'💬 雑談',other:'✨ その他'};
const DOW_NAMES   = ['日','月','火','水','木','金','土'];

function changeMonth(dir){ calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;} else if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function goToday(){ calYear=new Date().getFullYear(); calMonth=new Date().getMonth(); renderCalendar(); }

function renderCalendar(){
  document.getElementById('calMonthLabel').textContent = calYear+'年'+(calMonth+1)+'月';

  const firstDow = new Date(calYear,calMonth,1).getDay();
  const lastDate  = new Date(calYear,calMonth+1,0).getDate();
  const todayKey  = dateKey(new Date());

  let html = '';
  // Day-of-week headers
  DOW_NAMES.forEach((d,i)=>{
    const cls = i===0?'sun':i===6?'sat':'';
    html += `<div class="cal-dow ${cls}">${d}</div>`;
  });

  // Leading blanks
  const prevLastDate = new Date(calYear,calMonth,0).getDate();
  for(let i=0;i<firstDow;i++){
    const prevDay = prevLastDate - firstDow + 1 + i;
    html += `<div class="cal-cell other-month"><div class="cal-day-num">${prevDay}</div></div>`;
  }

  // Actual days
  for(let d=1;d<=lastDate;d++){
    const key = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = key===todayKey;
    const dow = new Date(calYear,calMonth,d).getDay();
    const dowCls = dow===0?'sun':dow===6?'sat':'';

    // Gather events
    const scheds = data.schedules.filter(s=>s.date===key).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const tasks  = data.tasks[key]||[];

    let evHtml = '';
    const maxShow = 3;
    let shown = 0;

    scheds.forEach(s=>{
      if(shown<maxShow){
        evHtml+=`<div class="cal-event type-${s.type}" onclick="event.stopPropagation();openDayDetail('${key}')">${escHtml((s.time?s.time+' ':'')+s.title)}</div>`;
        shown++;
      }
    });
    tasks.forEach(t=>{
      if(shown<maxShow){
        evHtml+=`<div class="cal-event type-task" onclick="event.stopPropagation();openDayDetail('${key}')">${escHtml(t.text)}</div>`;
        shown++;
      }
    });
    const totalExtra = scheds.length+tasks.length-shown;
    if(totalExtra>0) evHtml+=`<div class="cal-more">+${totalExtra} more</div>`;

    html+=`<div class="cal-cell${isToday?' today':''} ${dowCls}" onclick="openDayDetail('${key}')">
      <div class="cal-day-num">${d}</div>
      ${evHtml}
    </div>`;
  }

  // Trailing blanks
  const total = firstDow+lastDate;
  const trailing = total%7 ? 7-(total%7) : 0;
  for(let i=1;i<=trailing;i++){
    html+=`<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML=html;
}

function openDayDetail(key){
  selectedDayKey = key;
  const [yyyy,mm,dd] = key.split('-');
  document.getElementById('dayModalTitle').textContent = `${yyyy}年${parseInt(mm)}月${parseInt(dd)}日`;

  // Schedule list
  const scheds = data.schedules.filter(s=>s.date===key).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const schedHtml = scheds.length
    ? scheds.map(s=>`
      <div class="day-sched-item">
        <span class="day-sched-time">${s.time||'--:--'}</span>
        <span class="day-sched-title">${escHtml(s.title)}</span>
        <span class="sched-badge type-${s.type}">${TYPE_LABELS[s.type]||s.type}</span>
        <button class="btn-ghost" style="padding:2px 8px" onclick="deleteSched('${s.id}')">✕</button>
      </div>`).join('')
    : '<div style="font-size:.8rem;color:var(--text-muted);padding:6px 0">配信予定なし</div>';
  document.getElementById('daySchedList').innerHTML=schedHtml;

  // Task list
  const tasks = data.tasks[key]||[];
  renderDayTasks(key,tasks);

  document.getElementById('dayTaskInput').value='';
  document.getElementById('modal-day').classList.add('open');
  setTimeout(()=>document.getElementById('dayTaskInput').focus(),80);
}

function renderDayTasks(key,tasks){
  const html = tasks.map(t=>`
    <div class="day-task-item${t.done?' done':''}" id="dti-${t.id}">
      <input class="day-task-check" type="checkbox" ${t.done?'checked':''}
        onchange="toggleDayTask('${key}','${t.id}',this.checked)">
      <span class="day-task-text">${escHtml(t.text)}</span>
      <button class="btn-ghost" style="padding:2px 8px" onclick="deleteDayTask('${key}','${t.id}')">✕</button>
    </div>`).join('');
  document.getElementById('dayTaskList').innerHTML = html||'<div style="font-size:.8rem;color:var(--text-muted);padding:6px 0">タスクなし</div>';
}

function toggleDayTask(key,id,done){
  const t=(data.tasks[key]||[]).find(t=>t.id===id);
  if(t){ t.done=done; save(); renderCalendar(); }
  const el=document.getElementById('dti-'+id);
  if(el) el.classList.toggle('done',done);
}
function deleteDayTask(key,id){
  if(data.tasks[key]){ data.tasks[key]=data.tasks[key].filter(t=>t.id!==id); save(); }
  openDayDetail(key); renderCalendar();
}
function addDayTask(){
  const text=document.getElementById('dayTaskInput').value.trim();
  if(!text) return;
  if(!data.tasks[selectedDayKey]) data.tasks[selectedDayKey]=[];
  data.tasks[selectedDayKey].push({id:uid(),text,done:false});
  save(); openDayDetail(selectedDayKey); renderCalendar();
}
function deleteSched(id){
  data.schedules=data.schedules.filter(s=>s.id!==id);
  save(); toast('削除しました');
  if(selectedDayKey) openDayDetail(selectedDayKey);
  renderCalendar();
}
function openSchedFromDay(){
  closeModal('day');
  openModal('sched', selectedDayKey);
}
function addSched(){
  const date =document.getElementById('schedDate').value;
  const time =document.getElementById('schedTime').value;
  const title=document.getElementById('schedTitle').value.trim();
  const type =document.getElementById('schedType').value;
  if(!date||!title){ toast('日付とタイトルを入力してください'); return; }
  data.schedules.push({id:uid(),date,time,title,type});
  save(); renderCalendar(); closeModal('sched');
  document.getElementById('schedDate').value='';
  document.getElementById('schedTime').value='';
  document.getElementById('schedTitle').value='';
  toast('配信予定を追加しました！');
}

// ========== 企画 ==========
function renderPlans(){
  const list=document.getElementById('planList');
  if(!data.plans.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🎬</div>まだ企画がありません<br>「企画を追加」から追加しましょう！</div>';
    return;
  }
  list.innerHTML=data.plans.map(p=>`
    <div class="plan-card" id="plan-${p.id}">
      <div class="plan-card-view">
        <div class="plan-card-header">
          <div class="plan-card-title">${escHtml(p.title)}</div>
          <div class="plan-card-date">${p.date}</div>
        </div>
        <div class="plan-card-body">${escHtml(p.body)}</div>
        <div class="plan-card-footer" style="gap:8px">
          <button class="btn-ghost" style="margin-right:auto" onclick="startEditPlan('${p.id}')">✏️ 編集</button>
          <button class="btn-ghost" onclick="deletePlan('${p.id}')">✅ 完了して削除</button>
        </div>
      </div>
      <div class="plan-edit-form">
        <input class="plan-edit-input" id="pei-${p.id}" value="${escHtml(p.title)}" placeholder="企画タイトル">
        <textarea class="plan-edit-ta" id="pea-${p.id}">${escHtml(p.body)}</textarea>
        <div class="plan-edit-actions">
          <button class="btn-ghost" onclick="cancelEditPlan('${p.id}')">キャンセル</button>
          <button class="btn-primary" onclick="saveEditPlan('${p.id}')">保存</button>
        </div>
      </div>
    </div>`).join('');
}
function addPlan(){
  const title=document.getElementById('planTitle').value.trim();
  const body =document.getElementById('planBody').value.trim();
  if(!title){ toast('タイトルを入力してください'); return; }
  data.plans.unshift({id:uid(),title,body,date:formatDate(new Date())});
  save(); renderPlans(); closeModal('plan');
  document.getElementById('planTitle').value='';
  document.getElementById('planBody').value='';
  toast('企画を追加しました！');
}
function deletePlan(id){ data.plans=data.plans.filter(p=>p.id!==id); save(); renderPlans(); toast('企画を完了しました！'); }
function startEditPlan(id){
  const card=document.getElementById('plan-'+id);
  if(!card) return;
  card.classList.add('editing');
  const inp=document.getElementById('pei-'+id);
  if(inp) setTimeout(()=>inp.focus(),50);
}
function cancelEditPlan(id){
  const card=document.getElementById('plan-'+id);
  if(card) card.classList.remove('editing');
}
function saveEditPlan(id){
  const p=data.plans.find(p=>p.id===id);
  if(!p) return;
  const title=(document.getElementById('pei-'+id).value||'').trim();
  const body=(document.getElementById('pea-'+id).value||'').trim();
  if(!title){ toast('タイトルを入力してください'); return; }
  p.title=title; p.body=body;
  save(); renderPlans(); toast('企画を更新しました！');
}

// ========== タスク (週次) ==========
let weekOffset=0;
function getWeekDates(offset){
  const today=new Date(); const dow=today.getDay();
  const mon=new Date(today);
  mon.setDate(today.getDate()-(dow===0?6:dow-1)+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function changeWeek(dir){ weekOffset+=dir; renderWeek(); }
const DAY_NAMES=['月','火','水','木','金','土','日'];
function renderWeek(){
  const dates=getWeekDates(weekOffset);
  const todayKey=dateKey(new Date());
  const s=dates[0],e=dates[6];
  document.getElementById('weekLabel').textContent=`${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
  document.getElementById('weekColumns').innerHTML=dates.map((d,i)=>{
    const key=dateKey(d); const isToday=key===todayKey;
    const tasks=data.tasks[key]||[];
    const items=tasks.map(t=>`
      <div class="task-item${t.done?' done':''}" id="ti-${t.id}">
        <input class="task-checkbox" type="checkbox" ${t.done?'checked':''}
          onchange="toggleTask('${key}','${t.id}',this.checked)">
        <span class="task-text">${escHtml(t.text)}</span>
        <button class="task-del" onclick="deleteTask('${key}','${t.id}')">✕</button>
      </div>`).join('');
    return `
      <div class="day-column${isToday?' today':''}">
        <div class="day-header">
          <div class="day-name">${DAY_NAMES[i]}曜日</div>
          <div class="day-date">${d.getMonth()+1}/${d.getDate()}</div>
        </div>
        ${items}
        <div class="add-task-form">
          <input class="add-task-input" id="ti-input-${key}" placeholder="追加…" maxlength="60"
            onkeydown="if(event.key==='Enter') addTask('${key}')">
          <button class="add-task-btn" onclick="addTask('${key}')">＋</button>
        </div>
      </div>`;
  }).join('');
}
function addTask(key){
  const input=document.getElementById('ti-input-'+key);
  const text=input.value.trim(); if(!text) return;
  if(!data.tasks[key]) data.tasks[key]=[];
  data.tasks[key].push({id:uid(),text,done:false});
  save(); renderWeek();
  const el=document.getElementById('ti-input-'+key); if(el) el.focus();
}
function toggleTask(key,id,done){
  const t=(data.tasks[key]||[]).find(t=>t.id===id);
  if(t){ t.done=done; save(); }
  const item=document.getElementById('ti-'+id); if(item) item.classList.toggle('done',done);
}
function deleteTask(key,id){
  if(data.tasks[key]){ data.tasks[key]=data.tasks[key].filter(t=>t.id!==id); save(); renderWeek(); }
}

// ========== マネタイズ ==========
function renderGoals(){
  const list=document.getElementById('goalList');
  if(!data.goals.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">💰</div>まだ目標がありません<br>「目標を追加」から追加しましょう！</div>';
    return;
  }
  list.innerHTML=data.goals.map(g=>{
    const total=g.actions.length, done=g.actions.filter(a=>a.done).length;
    const pct=total?Math.round(done/total*100):0;
    const actionItems=g.actions.map(a=>`
      <div class="action-item${a.done?' done':''}" id="ai-${a.id}">
        <input class="action-checkbox" type="checkbox" ${a.done?'checked':''}
          onchange="toggleAction('${g.id}','${a.id}',this.checked)">
        <span class="action-text">${escHtml(a.text)}</span>
        <button class="action-del" onclick="deleteAction('${g.id}','${a.id}')">✕</button>
      </div>`).join('');
    return `
      <div class="goal-card">
        <div class="goal-card-header">
          <div class="goal-title">🎯 ${escHtml(g.title)}</div>
          <button class="btn-ghost" onclick="deleteGoal('${g.id}')">削除</button>
        </div>
        <div class="goal-progress-bar"><div class="goal-progress-fill" style="width:${pct}%"></div></div>
        <div class="goal-progress-label">${done}/${total} 完了 (${pct}%)</div>
        <div class="action-list">${actionItems}</div>
        <div class="add-action-form">
          <input class="add-action-input" id="ai-input-${g.id}" placeholder="アクションを追加…" maxlength="80"
            onkeydown="if(event.key==='Enter') addAction('${g.id}')">
          <button class="add-action-btn" onclick="addAction('${g.id}')">＋</button>
        </div>
      </div>`;
  }).join('');
}
function addGoal(){
  const title=document.getElementById('goalTitle').value.trim();
  if(!title){ toast('タイトルを入力してください'); return; }
  data.goals.push({id:uid(),title,actions:[]});
  save(); renderGoals(); closeModal('goal');
  document.getElementById('goalTitle').value='';
  toast('目標を追加しました！');
}
function deleteGoal(id){
  if(!confirm('この目標を削除しますか？')) return;
  data.goals=data.goals.filter(g=>g.id!==id); save(); renderGoals(); toast('目標を削除しました');
}
function addAction(goalId){
  const input=document.getElementById('ai-input-'+goalId);
  const text=input.value.trim(); if(!text) return;
  const goal=data.goals.find(g=>g.id===goalId);
  if(goal){ goal.actions.push({id:uid(),text,done:false}); save(); renderGoals(); }
  const el=document.getElementById('ai-input-'+goalId); if(el) el.focus();
}
function toggleAction(goalId,actionId,done){
  const goal=data.goals.find(g=>g.id===goalId);
  if(goal){ const a=goal.actions.find(a=>a.id===actionId); if(a){ a.done=done; save(); renderGoals(); } }
}
function deleteAction(goalId,actionId){
  const goal=data.goals.find(g=>g.id===goalId);
  if(goal){ goal.actions=goal.actions.filter(a=>a.id!==actionId); save(); renderGoals(); }
}

// ========== 収益（月次）==========
function renderIncomeTab(){
  renderIncomeGoal();
  renderIncomeStatus();
  renderIncomeMonthlyList();
}

function renderIncomeGoal(){
  const t=data.monthlyTarget||0;
  document.getElementById('incomeGoalVal').textContent='¥'+t.toLocaleString();
}

function renderIncomeStatus(){
  const now=new Date();
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const rec=data.incomeMonthly.find(r=>r.yearMonth===ym);
  const total=rec?((rec.supa||0)+(rec.member||0)+(rec.goods||0)+(rec.sponsor||0)+(rec.other||0)):0;
  const target=data.monthlyTarget||0;
  const diff=total-target;
  const pct=target>0?Math.min(Math.round(total/target*100),100):0;
  const ymLabel=ym.replace('-','年')+'月';

  let diffHtml='';
  if(target>0){
    if(diff>=0){
      diffHtml=`<div class="income-status-row">
        <span class="income-status-label">達成状況</span>
        <span class="income-status-diff ok">¥${diff.toLocaleString()} 達成！</span>
      </div>`;
    } else {
      diffHtml=`<div class="income-status-row">
        <span class="income-status-label">目標まで</span>
        <span class="income-status-diff ng">あと ¥${Math.abs(diff).toLocaleString()}</span>
      </div>`;
    }
    diffHtml+=`<div class="income-goal-bar"><div class="income-goal-fill" style="width:${pct}%"></div></div>
      <div class="income-goal-pct">${pct}% 達成</div>`;
  } else {
    diffHtml='<div style="font-size:.8rem;color:var(--text-muted);margin-top:4px">上の「設定」から目標月収を設定しましょう</div>';
  }

  document.getElementById('incomeStatusBox').innerHTML=`
    <div class="income-status-row">
      <span class="income-status-label">今月（${ymLabel}）の収益合計</span>
      <span class="income-status-total">¥${total.toLocaleString()}</span>
    </div>
    ${diffHtml}`;
}

function renderIncomeMonthlyList(){
  const list=document.getElementById('incomeMonthlyList');
  const records=[...data.incomeMonthly].sort((a,b)=>b.yearMonth.localeCompare(a.yearMonth));
  if(!records.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">💴</div>まだ収益データがありません<br>「入力」から月次収益を記録しましょう！</div>';
    return;
  }
  const target=data.monthlyTarget||0;
  list.innerHTML=records.map(r=>{
    const total=(r.supa||0)+(r.member||0)+(r.goods||0)+(r.sponsor||0)+(r.other||0);
    const pct=target>0?Math.min(Math.round(total/target*100),100):0;
    const bd=[
      r.supa?   {l:'💗スパチャ',   v:r.supa}   :null,
      r.member? {l:'💎メンバー',   v:r.member} :null,
      r.goods?  {l:'🛍️グッズ',    v:r.goods}  :null,
      r.sponsor?{l:'✨案件',       v:r.sponsor}:null,
      r.other?  {l:'📦その他',     v:r.other}  :null,
    ].filter(Boolean);
    const bdHtml=bd.map(b=>`<div class="income-bd-item">${b.l} <b>¥${b.v.toLocaleString()}</b></div>`).join('');
    const ymLabel=r.yearMonth.replace('-','年')+'月';
    return `
      <div class="income-monthly-card">
        <div class="income-monthly-head">
          <div class="income-monthly-ym">${ymLabel}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="income-monthly-total">¥${total.toLocaleString()}</div>
            ${target>0?`<span style="font-size:.7rem;color:var(--text-muted)">${pct}%</span>`:''}
            <button class="btn-ghost" style="padding:2px 8px" onclick="deleteIncomeMonthly('${r.id}')">✕</button>
          </div>
        </div>
        ${target>0?`<div class="income-goal-bar" style="margin-bottom:8px"><div class="income-goal-fill" style="width:${pct}%"></div></div>`:''}
        <div class="income-monthly-bd">${bdHtml}</div>
        ${r.note?`<div style="font-size:.75rem;color:var(--text-muted);margin-top:6px">${escHtml(r.note)}</div>`:''}
      </div>`;
  }).join('');
}

function openIncomeGoalModal(){
  document.getElementById('incomeGoalInput').value=data.monthlyTarget||'';
  openModal('income-goal');
}
function saveIncomeGoal(){
  const v=parseInt(document.getElementById('incomeGoalInput').value);
  if(isNaN(v)||v<0){ toast('正しい金額を入力してください'); return; }
  data.monthlyTarget=v;
  save(); renderIncomeTab(); closeModal('income-goal');
  toast('目標月収を設定しました！');
}

function openIncomeMonthlyModal(){
  const now=new Date();
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('incomeMonthInput').value=ym;
  ['supa','member','goods','sponsor','other'].forEach(k=>{ document.getElementById('im-'+k).value=''; });

  if(rec){
    ['supa','member','goods','sponsor','other'].forEach(k=>{
      document.getElementById('im-'+k).value=rec[k]||'';
    });

function saveIncomeMonthly(){
  const ym=document.getElementById('incomeMonthInput').value;
  if(!ym){ toast('年月を選択してください'); return; }
  const supa   =parseInt(document.getElementById('im-supa').value)||0;
  const member =parseInt(document.getElementById('im-member').value)||0;
  const goods  =parseInt(document.getElementById('im-goods').value)||0;
  const sponsor=parseInt(document.getElementById('im-sponsor').value)||0;
  const other  =parseInt(document.getElementById('im-other').value)||0;
  const note   =document.getElementById('im-note').value.trim();
  const idx=data.incomeMonthly.findIndex(r=>r.yearMonth===ym);
  if(idx>=0){
    Object.assign(data.incomeMonthly[idx],{supa,member,goods,sponsor,other,note});
  } else {
    data.incomeMonthly.push({id:uid(),yearMonth:ym,supa,member,goods,sponsor,other,note});
  }
  save(); renderIncomeTab(); closeModal('income-monthly');
  toast('収益を保存しました！');
}
function deleteIncomeMonthly(id){
  data.incomeMonthly=data.incomeMonthly.filter(r=>r.id!==id);
  save(); renderIncomeMonthlyList(); renderIncomeStatus();
  toast('削除しました');
}

// ========== チャレンジ ==========
function renderChallenges(){
  const list=document.getElementById('challengeList');
  if(!data.challenges.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🎯</div>チャレンジがありません<br>「チャレンジを追加」から目標を作りましょう！</div>';
    return;
  }
  list.innerHTML=data.challenges.map(c=>{
    const filled=c.filled||[];
    const pct=Math.round(filled.length/c.target*100);
    let cells='';
    for(let n=1;n<=c.target;n++){
      const isFilled=filled.includes(n);
      cells+=`<div class="c-cell${isFilled?' filled':''}" onclick="toggleCell('${c.id}',${n})">${n}</div>`;
    }
    return `
      <div class="challenge-card">
        <div class="challenge-header">
          <div class="challenge-title">🎯 ${escHtml(c.title)}</div>
          <button class="btn-ghost" onclick="deleteChallenge('${c.id}')">削除</button>
        </div>
        <div class="challenge-progress-bar">
          <div class="challenge-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="challenge-progress-label">${filled.length} / ${c.target} 達成 (${pct}%)</div>
        <div class="challenge-grid">${cells}</div>
        <div class="challenge-actions-row">
          <span style="font-size:.75rem;color:var(--text-muted)">マスをタップして塗りつぶそう</span>
          <button class="challenge-reset" onclick="resetChallenge('${c.id}')">リセット</button>
        </div>
      </div>`;
  }).join('');
}

function toggleCell(challengeId, n){
  const c=data.challenges.find(c=>c.id===challengeId);
  if(!c) return;
  if(!c.filled) c.filled=[];
  const idx=c.filled.indexOf(n);
  if(idx>=0) c.filled.splice(idx,1); else c.filled.push(n);
  save(); renderChallenges();
}

function addChallenge(){
  const title=document.getElementById('challengeTitle').value.trim();
  const target=parseInt(document.getElementById('challengeTarget').value);
  if(!title){ toast('タイトルを入力してください'); return; }
  if(!target||target<1||target>365){ toast('目標数は1〜365で入力してください'); return; }
  data.challenges.push({id:uid(),title,target,filled:[]});
  save(); renderChallenges(); closeModal('challenge');
  document.getElementById('challengeTitle').value='';
  document.getElementById('challengeTarget').value='';
  toast('チャレンジを作成しました！');
}

function deleteChallenge(id){
  if(!confirm('このチャレンジを削除しますか？')) return;
  data.challenges=data.challenges.filter(c=>c.id!==id); save(); renderChallenges(); toast('チャレンジを削除しました');
}

function resetChallenge(id){
  if(!confirm('達成記録をリセットしますか？')) return;
  const c=data.challenges.find(c=>c.id===id);
  if(c){ c.filled=[]; save(); renderChallenges(); toast('リセットしました'); }
}

// ========== グラフ ==========
let chartInstance=null, chartMode='sub';
function openChart(type){
  chartMode=type;
  document.getElementById('modal-chart').classList.add('open');
  document.getElementById('chartBtnSub').className='chart-toggle-btn'+(type==='sub'?' active blue':'');
  document.getElementById('chartBtnMem').className='chart-toggle-btn'+(type==='mem'?' active pink':'');
  setTimeout(()=>renderChart(type),50);
}
function switchChart(type){
  chartMode=type;
  document.getElementById('chartBtnSub').className='chart-toggle-btn'+(type==='sub'?' active blue':'');
  document.getElementById('chartBtnMem').className='chart-toggle-btn'+(type==='mem'?' active pink':'');
  renderChart(type);
}
function destroyChart(){ if(chartInstance){ chartInstance.destroy(); chartInstance=null; } }
function renderChart(type){
  destroyChart();
  const history=type==='sub'?data.subHistory:data.memHistory;
  const noData=document.getElementById('chartNoData');
  const canvas=document.getElementById('chartCanvas');
  if(!history||history.length<1){
    noData.style.display='flex'; canvas.style.display='none'; return;
  }
  noData.style.display='none'; canvas.style.display='block';
  const sorted=[...history].sort((a,b)=>a.date.localeCompare(b.date));
  const color=type==='sub'?'#5B9BD5':'#FF6B9D';
  const glow=type==='sub'?'rgba(91,155,213,.15)':'rgba(255,107,157,.15)';
  chartInstance=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{
      labels:sorted.map(h=>h.date),
      datasets:[{
        label:type==='sub'?'登録者数':'メンバー数',
        data:sorted.map(h=>h.value),
        borderColor:color,backgroundColor:glow,borderWidth:2,
        pointBackgroundColor:color,pointRadius:4,pointHoverRadius:6,
        tension:.3,fill:true,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1a2235',borderColor:color,borderWidth:1,
          titleColor:'#e2e8f0',bodyColor:color,
          callbacks:{ label:ctx=>ctx.parsed.y.toLocaleString()+'人' }
        }
      },
      scales:{
        x:{ ticks:{color:'#8892a4',font:{size:10},maxRotation:30}, grid:{color:'rgba(255,255,255,.04)'} },
        y:{ ticks:{color:'#8892a4',font:{size:10},callback:v=>v.toLocaleString()}, grid:{color:'rgba(255,255,255,.06)'}, beginAtZero:false }
      }
    }
  });
}

let pwaInstallEvent=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  pwaInstallEvent=e;
  const btn=document.getElementById('pwaInstallBtn');
  if(btn) btn.style.display='block';
});
document.getElementById('pwaInstallBtn').addEventListener('click', async()=>{
  if(!pwaInstallEvent) return;
  pwaInstallEvent.prompt();
  const result=await pwaInstallEvent.userChoice;
  if(result.outcome==='accepted'){
    document.getElementById('pwaInstallBtn').style.display='none';
    pwaInstallEvent=null;
    toast('ホーム画面に追加しました！');
  }
});

function makeIconDataUrl(size){
  const c=document.createElement('canvas');
  c.width=c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#0a0e1a'; ctx.fillRect(0,0,size,size);
  const g=ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,'#5B9BD5'); g.addColorStop(1,'#FF6B9D');
  ctx.fillStyle=g;
  ctx.font=`bold ${Math.round(size*0.38)}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('HQ',size/2,size/2);
  return c.toDataURL('image/png');
}

function setupPWA(){
  // Manifest (blob URL works when served via HTTP; harmless on file://)
  try{
    const icon192=makeIconDataUrl(192);
    const icon512=makeIconDataUrl(512);
    const manifest={
      name:'HISUMI HQ',short_name:'HISUMI HQ',
      description:'Your Personal Headquarters',
      start_url:'./',display:'standalone',
      orientation:'portrait-primary',
      theme_color:'#0a0e1a',background_color:'#0a0e1a',
      icons:[
        {src:icon192,sizes:'192x192',type:'image/png'},
        {src:icon512,sizes:'512x512',type:'image/png'}
      ]
    };
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    document.getElementById('pwaManifest').href=URL.createObjectURL(blob);
  }catch(e){}

  // Service Worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  // Task notifications
  checkTaskNotifications();
}

async function checkTaskNotifications(){
  if(!('Notification' in window)) return;
  const tomorrow=new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  const tKey=dateKey(tomorrow);
  const pending=(data.tasks[tKey]||[]).filter(t=>!t.done);
  if(!pending.length) return;

  const lastNotif=localStorage.getItem('hisumi_notif_'+tKey);
  if(lastNotif) return; // 今日すでに通知済み

  if(Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm!=='granted') return;
  }
  if(Notification.permission==='granted'){
    const titles=pending.slice(0,3).map(t=>t.text).join('、');
    new Notification('HISUMI HQ — 明日のタスク',{
      body:`明日は${pending.length}件のタスクがあります：${titles}`,
      tag:'hisumi-task-'+tKey,
      icon:makeIconDataUrl(192)
    });
    localStorage.setItem('hisumi_notif_'+tKey,'1');
  }
}
